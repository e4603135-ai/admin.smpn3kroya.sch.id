<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOMAIN TAKEN</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Share Tech Mono', monospace;
            background: #050505;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 30% 40%, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.9) 100%),
                url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" opacity="0.4"><rect width="800" height="800" fill="%23111111"/><circle cx="400" cy="380" r="200" fill="%23222222" stroke="%23999999" stroke-width="5"/><circle cx="400" cy="380" r="150" fill="%23111111" stroke="%23777777" stroke-width="4"/><circle cx="400" cy="380" r="100" fill="%231a1a1a" stroke="%23555555" stroke-width="3"/><circle cx="340" cy="340" r="28" fill="%23222222" stroke="%23444444" stroke-width="2"/><circle cx="460" cy="340" r="28" fill="%23222222" stroke="%23444444" stroke-width="2"/><path d="M340 440 Q400 500 460 440" stroke="%23444444" stroke-width="6" fill="none"/><rect x="320" y="520" width="160" height="80" rx="10" fill="%231a1a1a" stroke="%23444444" stroke-width="3"/><text x="400" y="575" font-family="monospace" font-size="38" fill="%23555555" text-anchor="middle" font-weight="bold">F SOCIETY</text><text x="400" y="660" font-family="monospace" font-size="26" fill="%23333333" text-anchor="middle">MR. ROBOT</text></svg>');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 0;
            animation: slowZoom 30s infinite alternate ease-in-out;
        }

        @keyframes slowZoom {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }

        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.05) 0px, rgba(0,0,0,0.05) 2px, transparent 2px, transparent 6px);
            pointer-events: none;
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 850px;
            width: 92%;
            padding: 3rem 2rem;
            text-align: center;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            border: 2px solid rgba(200, 40, 40, 0.6);
            border-radius: 24px;
            box-shadow: 0 0 80px rgba(200, 20, 20, 0.3), inset 0 0 100px rgba(200, 20, 20, 0.05);
            animation: borderPulse 3s infinite alternate;
        }

        @keyframes borderPulse {
            0% { border-color: rgba(200, 40, 40, 0.5); box-shadow: 0 0 40px rgba(200, 20, 20, 0.2); }
            100% { border-color: rgba(255, 60, 60, 0.8); box-shadow: 0 0 80px rgba(200, 20, 20, 0.5); }
        }

        .main-title {
            font-family: 'Orbitron', monospace;
            font-weight: 900;
            font-size: clamp(3.5rem, 15vw, 7rem);
            text-transform: uppercase;
            color: #f0f0f0;
            letter-spacing: 8px;
            text-shadow: 
                0 0 15px rgba(255, 0, 0, 0.5),
                0 0 40px rgba(255, 0, 0, 0.2);
            position: relative;
            display: inline-block;
            animation: glitch 2.5s infinite alternate;
        }

        @keyframes glitch {
            0% { transform: skew(0deg); text-shadow: 3px 0 red, -3px 0 cyan; }
            4% { transform: skew(3deg, -1deg); text-shadow: -4px 0 red, 4px 0 cyan; }
            8% { transform: skew(0deg); text-shadow: 0 0 15px red, 0 0 40px cyan; }
            12% { transform: skew(-4deg, 1deg); text-shadow: 5px 0 red, -5px 0 cyan; }
            16% { transform: skew(0deg); text-shadow: 0 0 20px red; }
            100% { transform: skew(0deg); text-shadow: 0 0 20px rgba(255,0,0,0.4); }
        }

        .main-title::before,
        .main-title::after {
            content: "DOMAIN TAKEN";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.5;
            pointer-events: none;
        }

        .main-title::before {
            color: #ff0000;
            z-index: -1;
            transform: translate(-5px, -3px);
            animation: shift1 2s infinite linear alternate;
        }

        .main-title::after {
            color: #00ffff;
            z-index: -1;
            transform: translate(5px, 3px);
            animation: shift2 2.5s infinite linear alternate;
        }

        @keyframes shift1 {
            0% { transform: translate(-8px, -4px); opacity: 0.4; }
            100% { transform: translate(5px, 3px); opacity: 0.8; }
        }
        @keyframes shift2 {
            0% { transform: translate(8px, 4px); opacity: 0.4; }
            100% { transform: translate(-5px, -3px); opacity: 0.8; }
        }

        .sub-text {
            font-size: clamp(1.1rem, 3vw, 1.8rem);
            color: #cccccc;
            background: rgba(0,0,0,0.6);
            padding: 0.8rem 2.2rem;
            border-radius: 60px;
            display: inline-block;
            border: 1px solid rgba(255, 70, 70, 0.3);
            margin-top: 0.3rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 400;
        }

        .sub-text i {
            color: #ff3333;
            margin: 0 10px;
        }

        .fsociety-badge {
            margin-top: 2.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .fsociety-badge span {
            font-family: 'Share Tech Mono', monospace;
            background: rgba(15, 15, 25, 0.8);
            padding: 0.5rem 1.8rem;
            border-radius: 40px;
            border: 1px solid #3a3a3a;
            font-size: 1.2rem;
            letter-spacing: 3px;
            color: #aaaaaa;
        }

        .fsociety-badge i {
            color: #ff3333;
            font-size: 2rem;
            filter: drop-shadow(0 0 12px rgba(255,0,0,0.3));
        }

        .status-bar {
            margin-top: 2rem;
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
            font-size: 0.9rem;
            color: #888888;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 1.5rem;
        }

        .status-bar .dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #ff1a1a;
            border-radius: 50%;
            margin-right: 8px;
            box-shadow: 0 0 18px #ff1a1a;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.1; }
            100% { opacity: 1; }
        }

        .status-bar .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.4);
            padding: 0.3rem 1.4rem;
            border-radius: 40px;
            border: 1px solid #222222;
        }

        .hacker-line {
            font-size: 0.85rem;
            color: #555555;
            margin-top: 2rem;
            letter-spacing: 2px;
            font-family: 'Share Tech Mono', monospace;
            border-left: 3px solid #ff3333;
            padding-left: 18px;
            text-align: left;
            display: inline-block;
            background: rgba(0,0,0,0.4);
            padding: 0.6rem 2rem;
            border-radius: 6px;
        }

        .hacker-line i {
            color: #ff3333;
            margin-right: 12px;
        }

        .glitch-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 3;
            background: transparent;
            animation: flicker 6s infinite;
        }

        @keyframes flicker {
            0% { background: rgba(255,0,0,0); }
            3% { background: rgba(255,0,0,0.05); }
            6% { background: rgba(0,255,255,0.03); }
            9% { background: rgba(255,0,0,0); }
            100% { background: rgba(0,0,0,0); }
        }

        @media (max-width: 600px) {
            .container { padding: 2rem 1.2rem; }
            .status-bar { gap: 1rem; }
            .fsociety-badge span { font-size: 0.9rem; padding: 0.3rem 1.2rem; }
        }
    </style>
</head>
<body>

    <div class="glitch-overlay"></div>

    <div class="container">
        <div class="main-title">DOMAIN TAKEN</div>

        <div class="sub-text">
            <i class="fas fa-skull"></i> your domain has been taken <i class="fas fa-skull"></i>
        </div>

        <div class="fsociety-badge">
            <i class="fas fa-mask"></i>
            <span>#fsociety</span>
            <span>MR. ROBOT</span>
            <i class="fas fa-code"></i>
        </div>

        <div class="status-bar">
            <div class="stat-item">
                <span class="dot"></span> <span>TAKEOVER ACTIVE</span>
            </div>
            <div class="stat-item">
                <i class="fas fa-hashtag" style="color:#ff3333;"></i> <span>ROOT ACCESS</span>
            </div>
            <div class="stat-item">
                <i class="fas fa-clock" style="color:#666;"></i> <span>00:00:42</span>
            </div>
        </div>

        <div class="hacker-line">
            <i class="fas fa-terminal"></i> > ACCESS GRANTED — DOMAIN REDIRECTED
        </div>
    </div>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</body>
</html>
